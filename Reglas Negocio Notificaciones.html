<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manual SIA Notificaciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#003875;--p2:#1a56a0;--pl:#dbeafe;--p3:#eff6ff;
  --r:#b91c1c;--rl:#fee2e2;--g:#166534;--gl:#dcfce7;
  --o:#c2410c;--ol:#ffedd5;--y:#92400e;--yl:#fef3c7;
  --t:#1e293b;--tl:#64748b;--tll:#94a3b8;
  --bd:#e2e8f0;--bg:#f1f5f9;--w:#fff;
  --sw:230px;--hh:52px;--rd:10px;--sh:0 1px 4px rgba(0,0,0,.08)
}
/* ── LAYOUT: sticky header + sticky sidebar, body scrolls libremente ── */
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);font-size:13px}
#hdr{
  position:sticky;top:0;z-index:200;
  background:var(--p);color:var(--w);height:var(--hh);
  display:flex;align-items:center;padding:0 18px;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.3)
}
#hdr h1{font-size:14px;font-weight:700;letter-spacing:.2px}
#hdr .hsub{font-size:10px;opacity:.75;border-left:1px solid rgba(255,255,255,.3);padding-left:10px;margin-left:4px}
#lay{display:flex;align-items:flex-start}
#sb{
  width:var(--sw);flex-shrink:0;
  position:sticky;top:var(--hh);
  height:calc(100vh - var(--hh));
  overflow-y:auto;
  background:var(--w);border-right:1px solid var(--bd);padding:6px 0
}
#mn{flex:1;padding:22px;min-height:calc(100vh - var(--hh))}
/* ── SCROLLBAR VISIBLE ── */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#64748b}
/* Sidebar items */
.sg{padding:10px 14px 4px;font-size:10px;font-weight:700;color:var(--tll);letter-spacing:.8px;text-transform:uppercase;margin-top:6px}
.sg:first-child{margin-top:0}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:8px 14px;border:none;background:none;cursor:pointer;font-size:12.5px;color:var(--t);text-align:left;transition:.15s}
.nb:hover{background:#f8fafc}
.nb.a{background:var(--p3);color:var(--p);font-weight:600;border-right:3px solid var(--p)}
.ni{font-size:14px;width:18px;text-align:center}
/* Cards */
.card{background:var(--w);border-radius:var(--rd);padding:18px;box-shadow:var(--sh);border:1px solid var(--bd);margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
/* Stats */
.st{background:var(--w);border-radius:var(--rd);padding:14px 16px;box-shadow:var(--sh);border:1px solid var(--bd);border-top:4px solid var(--p)}
.st.r{border-top-color:var(--r)}.st.g{border-top-color:var(--g)}.st.o{border-top-color:var(--o)}
.sn{font-size:24px;font-weight:800;color:var(--p)}.st.r .sn{color:var(--r)}.st.g .sn{color:var(--g)}.st.o .sn{color:var(--o)}
.sl{font-size:11px;color:var(--tl);margin-top:2px}
/* Badges */
.bx{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.bp{background:var(--pl);color:var(--p)}.bg{background:var(--gl);color:var(--g)}
.br{background:var(--rl);color:var(--r)}.bo{background:var(--ol);color:var(--o)}
.by{background:var(--yl);color:var(--y)}.btl{background:#f1f5f9;color:var(--tl)}
/* Buttons */
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn:disabled{opacity:.4;cursor:default}
.btn-p{background:var(--p);color:var(--w)}.btn-p:hover:not(:disabled){background:var(--p2)}
.btn-s{background:var(--pl);color:var(--p)}.btn-s:hover{background:#bfdbfe}
.btn-g{background:none;border:1px solid var(--bd);color:var(--t)}.btn-g:hover:not(:disabled){background:var(--bg)}
/* Alerts */
.al{padding:10px 13px;border-radius:8px;font-size:12px;margin-bottom:10px;display:flex;gap:9px;align-items:flex-start;line-height:1.5}
.al-r{background:var(--rl);border-left:4px solid var(--r);color:var(--r)}
.al-y{background:var(--yl);border-left:4px solid #d97706;color:var(--y)}
.al-g{background:var(--gl);border-left:4px solid var(--g);color:var(--g)}
.al-b{background:var(--pl);border-left:4px solid var(--p);color:var(--p)}
/* Typography */
h2{font-size:18px;font-weight:700;color:var(--p);margin-bottom:3px}
h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--t)}
h4{font-size:12px;font-weight:700;margin-bottom:6px;color:var(--tl);text-transform:uppercase;letter-spacing:.4px}
.sub{color:var(--tl);font-size:12px;margin-bottom:18px;line-height:1.5}
/* Wizard */
.wz{max-width:640px}
.wz-prog{display:flex;gap:5px;margin-bottom:18px;align-items:center}
.wz-d{width:7px;height:7px;border-radius:50%;background:var(--bd);transition:.2s;flex-shrink:0}
.wz-d.a{background:var(--p);transform:scale(1.4)}.wz-d.dn{background:var(--g)}
.wz-note{font-size:11px;color:var(--y);margin-bottom:14px;padding:7px 11px;background:var(--yl);border-radius:6px}
.wo{padding:11px 14px;border:2px solid var(--bd);border-radius:9px;background:var(--w);cursor:pointer;text-align:left;transition:.2s;display:flex;flex-direction:column;gap:2px;margin-bottom:7px;width:100%}
.wo:hover{border-color:var(--p);background:var(--p3)}
.wl{font-weight:600;font-size:13px;color:var(--t)}.wo:hover .wl{color:var(--p)}
.ws{font-size:11px;color:var(--tl)}
.wr{padding:18px;border-radius:12px;border:2px solid var(--p);background:var(--p3)}
.wr-c{font-size:26px;font-weight:800;color:var(--p)}.wr-n{font-size:13px;font-weight:600;margin-bottom:12px}
.ws-i{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--pl);font-size:12px;line-height:1.5}
.ws-i:last-child{border-bottom:none}
.wsn{width:20px;height:20px;border-radius:50%;background:var(--p);color:var(--w);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.fl{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:9px 11px;background:rgba(0,56,117,.06);border-radius:8px;margin-top:12px}
.fn{padding:4px 10px;background:var(--p);color:var(--w);border-radius:5px;font-size:10px;font-weight:700}
.fa-arr{color:var(--tll);font-size:12px}
/* Rules */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:18px}
.rc{padding:10px 12px;border-radius:8px;background:var(--w);border:2px solid var(--bd);cursor:pointer;transition:.2s;text-align:left}
.rc:hover,.rc.s{border-color:var(--p);background:var(--p3)}
.rcd{font-size:17px;font-weight:800;color:var(--p)}.rnm{font-size:9.5px;color:var(--tl);margin-top:2px;line-height:1.3}
/* Tabs */
.tb-r{display:flex;border-bottom:2px solid var(--bd);margin-bottom:14px;overflow-x:auto}
.tb{padding:7px 13px;border:none;background:none;cursor:pointer;font-size:11.5px;font-weight:500;color:var(--tl);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.tb.a{color:var(--p);font-weight:700;border-bottom-color:var(--p)}
.tab-nav{margin-bottom:10px}
/* Lists */
.ls{list-style:none;counter-reset:s}
.ls li{counter-increment:s;display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px;align-items:flex-start;line-height:1.5}
.ls li:last-child{border-bottom:none}
.ls li::before{content:counter(s);width:20px;height:20px;border-radius:50%;background:var(--p);color:var(--w);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ld{list-style:none}
.ld li{padding:6px 0 6px 14px;position:relative;font-size:12px;border-bottom:1px solid var(--bd);line-height:1.5}
.ld li:last-child{border-bottom:none}
.ld li::before{content:'•';position:absolute;left:0;color:var(--p);font-weight:700}
.ri{display:flex;gap:8px;padding:8px 10px;background:var(--rl);border-radius:7px;margin-bottom:5px;font-size:11.5px;color:var(--r);align-items:flex-start;line-height:1.5}
/* Calc */
.cf{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;align-items:end}
.fg{display:flex;flex-direction:column;gap:4px}
label{font-size:10px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.4px}
input[type=date],input[type=number],select{padding:7px 10px;border:1px solid var(--bd);border-radius:7px;font-size:12px;background:var(--w);color:var(--t);width:100%}
.cr{padding:18px;border-radius:12px;background:var(--w);border:2px solid var(--g);text-align:center;margin-bottom:14px}
.cr .big{font-size:22px;font-weight:800;color:var(--p);margin:6px 0}
.cr .lbl{font-size:10px;color:var(--tl);text-transform:uppercase;letter-spacing:.4px}
.cr .dtl{font-size:11px;color:var(--tl);margin-top:8px;line-height:1.6}
/* Checklists */
.chi{display:flex;gap:9px;align-items:flex-start;padding:8px;border-radius:7px;cursor:pointer;margin-bottom:1px;transition:.15s}
.chi:hover{background:var(--bg)}
.chi input[type=checkbox]{width:14px;height:14px;cursor:pointer;margin-top:2px;flex-shrink:0;accent-color:var(--g)}
.chi.dn .cl{text-decoration:line-through;color:var(--tll)}
.cl{font-size:12px;cursor:pointer;line-height:1.5}
.crit{font-size:9px;font-weight:700;color:var(--r);background:var(--rl);padding:1px 5px;border-radius:10px;margin-left:5px}
.pb{height:6px;background:var(--bd);border-radius:10px;overflow:hidden;margin:8px 0}
.pf-bar{height:100%;background:var(--g);border-radius:10px;transition:.3s}
/* Causals */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--p);color:var(--w);padding:8px 12px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
td{padding:8px 12px;border-bottom:1px solid var(--bd);line-height:1.4}
tr.sub td{background:rgba(22,101,52,.05)}
tr.nosub td{background:rgba(185,28,28,.04)}
tr:hover td{filter:brightness(.97)}
/* FAQ */
.fi{border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;overflow:hidden}
.fq{padding:11px 13px;cursor:pointer;font-weight:600;font-size:12px;background:var(--w);display:flex;justify-content:space-between;align-items:center;gap:10px;transition:.15s;user-select:none}
.fq:hover{background:var(--bg)}
.fat{padding:0 13px;max-height:0;overflow:hidden;transition:.35s;font-size:12px;color:var(--tl);line-height:1.7}
.fat.op{padding:10px 13px;max-height:300px}
.srch{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;margin-bottom:12px;background:var(--w)}
/* Pills */
.pf-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:4px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--w);cursor:pointer;font-size:11px;font-weight:600;color:var(--tl);transition:.15s}
.pill:hover,.pill.a{background:var(--p);color:var(--w);border-color:var(--p)}
@media(max-width:750px){.g2,.g4,.cf{grid-template-columns:1fr}#sb{display:none}#mn{padding:14px}}
</style>
</head>
<body>
<header id="hdr">
  <span style="font-size:20px">📋</span>
  <div>
    <h1>Manual Interactivo de Notificaciones SIA</h1>
    <span class="hsub">MinTIC · Subdirección de Investigaciones Administrativas · v2.0 · 2026</span>
  </div>
</header>
<div id="lay">
  <nav id="sb"></nav>
  <main id="mn"></main>
</div>

    const fl=r.flow?`<div class="fl">${r.flow.map((f,i)=>i%2===0?`<span class="fn">${f}</span>`:`<span class="fa-arr">→</span>`).join('')}</div>`:'';
    return`<h2>🧭 Árbol de Decisión</h2><div class="sub">Regla identificada</div>
    <div class="wz">
      <div class="wz-prog">${Array.from({length:tot},()=>`<div class="wz-d dn"></div>`).join('')}
        <span style="font-size:11px;color:var(--g);margin-left:6px;font-weight:700">✓ Completado</span></div>
      <div class="wr">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span style="font-size:24px;font-weight:800;color:var(--p)">${r.code}</span>
          <span class="bx ${r.bc}">${r.badge}</span></div>
        <div class="wr-n">${r.name}</div>
        <div class="al al-g"><span>✅</span><div>Regla identificada. Siga los pasos.</div></div>
        <h4>Pasos principales</h4>
        <div>${r.steps.map((s,i)=>`<div class="ws-i"><div class="wsn">${i+1}</div><div>${s}</div></div>`).join('')}</div>
        ${fl}
        <div class="al al-y" style="margin-top:12px"><span>⏱️</span><div style="white-space:pre-line">${r.plazo}</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-p" onclick="wizNode='start';wizHist=[];render()">🔄 Nueva consulta</button>
        <button class="btn btn-s" onclick="setRule('${nd.result}');go('rules')">📖 Ver regla completa</button>
        ${bk}</div>
    </div>`;}
  return`<h2>🧭 Árbol de Decisión</h2><div class="sub">Responda las preguntas para identificar la regla correcta</div>
  <div class="wz">
    <div class="wz-prog">${dots}<span style="font-size:11px;color:var(--tl);margin-left:6px">Paso ${wizHist.length+1} de ${tot}</span></div>
    ${nd.note?`<div class="wz-note">⚠️ ${nd.note}</div>`:''}
    <div style="font-size:15px;font-weight:700;margin-bottom:12px">${nd.q}</div>
    ${nd.opts.map(o=>`<button class="wo" onclick="wGo('${o.n}')"><span class="wl">${o.l}</span>${o.s?`<span class="ws">${o.s}</span>`:''}</button>`).join('')}
    ${wizHist.length?`<div style="margin-top:10px">${bk}</div>`:''}
  </div>`;}

function wGo(n){wizHist.push(wizNode);wizNode=n;render();}
function wBack(){if(wizHist.length){wizNode=wizHist.pop();render();}}

// ── RULES ──
function rRules(){
  const r=RD[selRule];
  const chips=Object.values(RD).map(x=>`<div class="rc ${selRule===x.code?'s':''}" onclick="setRule('${x.code}')">
    <div class="rcd">${x.code}</div>
    <div class="rnm">${x.name.length>44?x.name.slice(0,42)+'…':x.name}</div>
    <div style="margin-top:4px"><span class="bx ${x.bc}">${x.badge}</span></div>
  </div>`).join('');
  const TABS=['¿Cuándo?','Procedimiento','Documentos','Plazos','Riesgos','Legal'];
  const tc=[
    `<ul class="ld">${r.when.map(w=>`<li>${w}</li>`).join('')}</ul>`,
    `<ol class="ls">${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`,
    `<ul class="ld">${r.docs.map(d=>`<li>${d}</li>`).join('')}</ul>`,
    `<div class="al al-y"><span>⏱️</span><div style="white-space:pre-line">${r.plazo}</div></div>${r.flow?`<h4 style="margin-top:12px">Flujo</h4><div class="fl">${r.flow.map((f,i)=>i%2===0?`<span class="fn">${f}</span>`:`<span class="fa-arr">→</span>`).join('')}</div>`:''}`,
    r.risks.map(x=>`<div class="ri"><span style="flex-shrink:0">⛔</span><div>${x}</div></div>`).join(''),
    `<ul class="ld">${r.legal.map(l=>`<li>${l}</li>`).join('')}</ul>`
  ];
  return`<h2>📚 Reglas de Notificación</h2>
  <div class="sub">Seleccione una regla y navegue por sus secciones</div>
  <div class="rg">${chips}</div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <span style="font-size:22px;font-weight:800;color:var(--p)">${r.code}</span>
      <span class="bx ${r.bc}">${r.badge}</span>
    </div>
    <h3 style="margin-bottom:10px">${r.name}</h3>
    <div class="tab-nav">
      <button class="btn btn-g" onclick="tabBack()" ${tabHist.length===0?'disabled':''}>← Pestaña anterior</button>
    </div>
    <div class="tb-r">${TABS.map((t,i)=>`<button class="tb ${selTab===i?'a':''}" onclick="goTab(${i})">${t}</button>`).join('')}</div>
    <div>${tc[selTab]}</div>
  </div>`;}

// ── CALC ──
function rCalc(){return`
<h2>📅 Calculadora de Plazos</h2>
<div class="sub">Calcula el vencimiento en días hábiles (excluye sábados y domingos). Verifique festivos manualmente.</div>
<div class="card">
  <div class="cf">
    <div class="fg"><label>Fecha de surtida</label><input type="date" id="cD" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="fg"><label>Tipo de plazo</label>
      <select id="cT">
        <option value="15">Descargos – 15 días hábiles (R1–R7)</option>
        <option value="10">Alegatos – 10 días hábiles (R5, R9, R11)</option>
        <option value="5">Comparecencia – 5 días (R2, R3)</option>
        <option value="20">Período probatorio – 20 días (R10)</option>
        <option value="30">Período probatorio – 30 días (R10)</option>
        <option value="c">Personalizado…</option>
      </select></div>
    <div class="fg" id="cCW" style="display:none"><label>Días hábiles</label><input type="number" id="cC" min="1" max="120" value="15"></div>
  </div>
  <button class="btn btn-p" onclick="calcD()">Calcular vencimiento →</button>
</div>
<div id="cR"></div>
<div class="card">
  <h3>📌 Reglas de cómputo por tipo</h3>
  <div style="margin-top:10px">
    <div class="al al-b"><span>ℹ️</span><div><strong>R1:</strong> Surtida = momento del acuse de entrega. Plazo inicia día hábil siguiente.</div></div>
    <div class="al al-y"><span>ℹ️</span><div><strong>R5:</strong> Surtida = AL FINALIZAR el día hábil siguiente a la entrega exitosa.</div></div>
    <div class="al al-r"><span>ℹ️</span><div><strong>R7:</strong> Surtida = AL FINALIZAR el día hábil siguiente al RETIRO de la publicación.</div></div>
    <div class="al al-g"><span>ℹ️</span><div><strong>R13:</strong> Surtida = fecha de RADICACIÓN ante MinTIC, no de redacción.</div></div>
  </div>
</div>`;}

function bindCalc(){
  const s=document.getElementById('cT'),w=document.getElementById('cCW');
  if(s&&w)s.addEventListener('change',()=>{w.style.display=s.value==='c'?'block':'none';});
}
function calcD(){
  const dv=document.getElementById('cD').value;
  const tv=document.getElementById('cT').value;
  if(!dv)return;
  const dias=tv==='c'?parseInt(document.getElementById('cC').value)||15:parseInt(tv);
  const st=new Date(dv+'T12:00:00');
  const ini=bizAdd(st,1);
  const vn=bizAdd(ini,dias-1);
  document.getElementById('cR').innerHTML=`<div class="cr">
    <div class="lbl">Fecha de surtida</div>
    <div style="font-size:14px;font-weight:600;margin:4px 0">${fmtD(st)}</div>
    <hr style="border:none;border-top:1px solid var(--bd);margin:10px 0">
    <div class="lbl">Plazo inicia (día hábil siguiente)</div>
    <div style="font-size:13px;color:var(--tl);margin:4px 0">${fmtD(ini)}</div>
    <hr style="border:none;border-top:1px solid var(--bd);margin:10px 0">
    <div class="lbl">Vencimiento (${dias} días hábiles)</div>
    <div class="big">${fmtD(vn)}</div>
    <div class="dtl">⚠️ Excluye sábados y domingos. Verifique festivos colombianos manualmente.</div>
  </div>`;}

// ── CHECKLISTS ──
function rCheck(){
  const ks=Object.keys(CL);const c=CL[selChk];
  if(!chkSt[selChk])chkSt[selChk]=c.items.map(()=>false);
  const dn=chkSt[selChk].filter(Boolean).length;
  const pct=Math.round(dn/c.items.length*100);
  return`<h2>✅ Checklists de Control de Calidad</h2>
  <div class="sub">Verifique la documentación antes de pasar a la siguiente etapa</div>
  <div class="pf-row">${ks.map(k=>`<button class="pill ${selChk===k?'a':''}" onclick="selChk='${k}';render()">${k}</button>`).join('')}</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <h3>${c.label}</h3>
      <span style="font-size:12px;font-weight:700;color:${pct===100?'var(--g)':'var(--tl)'}">${dn}/${c.items.length} · ${pct}%</span>
    </div>
    <div class="pb"><div class="pf-bar" style="width:${pct}%"></div></div>
    ${pct===100?`<div class="al al-g"><span>🎉</span><div><strong>¡Completa!</strong> Puede proceder a la siguiente etapa.</div></div>`:''}
    <div>${c.items.map((it,i)=>`<div class="chi ${chkSt[selChk][i]?'dn':''}" onclick="tChk(${i})">
      <input type="checkbox" ${chkSt[selChk][i]?'checked':''} onclick="event.stopPropagation();tChk(${i})">
      <span class="cl">${it.t}${it.crit?'<span class="crit">CRÍTICO</span>':''}</span>
    </div>`).join('')}</div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-g" onclick="chkSt[selChk]=CL[selChk].items.map(()=>false);render()">🔄 Reiniciar</button>
      <button class="btn btn-g" onclick="chkSt[selChk]=CL[selChk].items.map(()=>true);render()">☑️ Marcar todo</button>
    </div>
  </div>`;}

function tChk(i){if(!chkSt[selChk])chkSt[selChk]=CL[selChk].items.map(()=>false);chkSt[selChk][i]=!chkSt[selChk][i];render();}

// ── CAUSALS ──
function rCausals(){return`
<h2>↩️ Causales de Devolución (R6)</h2>
<div class="sub">Identifique la causal y aplique la acción correspondiente</div>
<div class="al al-r"><span>⚠️</span><div><strong>Regla crítica:</strong> Si caducidad &lt;30 días → acelerar a R7. NUNCA archivar sin intentar notificar.</div></div>
<div class="card" style="padding:0;overflow:hidden">
  <table>
    <thead><tr><th>Código</th><th>Nombre</th><th>Significado</th><th>¿Subsanable?</th><th>Acción</th><th>Tiempo</th></tr></thead>
    <tbody>${CAUSALS.map(x=>`<tr class="${x.s===true?'sub':x.s===false?'nosub':''}">
      <td><strong>${x.c}</strong></td><td>${x.n}</td><td style="color:var(--tl)">${x.d}</td>
      <td style="text-align:center">${x.s===true?'<span class="bx bg">✅ SÍ</span>':x.s===false?'<span class="bx br">❌ NO</span>':'<span class="bx btl">Evaluar</span>'}</td>
      <td>${x.a}</td><td style="color:var(--tl);white-space:nowrap">${x.t}</td>
    </tr>`).join('')}</tbody>
  </table>
</div>
<div class="g2" style="margin-top:4px">
  <div class="card" style="border-left:4px solid var(--g)">
    <h3 style="color:var(--g)">✅ Subsanables → Relanzar</h3>
    <div style="font-size:12px;color:var(--tl);line-height:2;margin-top:8px">
      <strong>NE</strong> – Número errado: corregir en RUES<br>
      <strong>DR</strong> – Dirección errada: validar y reenviar<br>
      <strong>N1/N2</strong> – No contactado: esperar 3–5 días<br>
      <strong>C1/C2</strong> – Cerrado: esperar normalización<br>
      <strong>FM</strong> – Fuerza mayor: esperar y relanzar
    </div>
  </div>
  <div class="card" style="border-left:4px solid var(--r)">
    <h3 style="color:var(--r)">❌ No Subsanables → Cambiar regla</h3>
    <div style="font-size:12px;color:var(--tl);line-height:2;margin-top:8px">
      <strong>NS</strong> – No reside → cambiar a R5<br>
      <strong>RH</strong> – Rehusado → cambiar a R5<br><br>
      <span style="color:var(--r)">⚠️ Si caducidad &lt;30 días → R7 directo</span>
    </div>
  </div>
</div>`;}

// ── FAQ ──
function rFaq(){return`
<h2>❓ Preguntas Frecuentes</h2>
<div class="sub">Respuestas a las dudas operativas más comunes</div>
<input class="srch" placeholder="🔍 Buscar…" oninput="fFaq(this.value)">
<div id="fL">${FAQ.map((f,i)=>`<div class="fi" data-q="${(f.q+f.a).toLowerCase()}">
  <div class="fq" onclick="tFaq(${i})"><span>${f.q}</span><span id="fa${i}">${faqOpen===i?'▲':'▼'}</span></div>
  <div class="fat ${faqOpen===i?'op':''}" id="fat${i}">${f.a}</div>
</div>`).join('')}</div>`;}

function tFaq(i){
  faqOpen=faqOpen===i?-1:i;
  document.querySelectorAll('.fat').forEach((f,j)=>f.classList.toggle('op',faqOpen===j));
  document.querySelectorAll('[id^="fa"]').forEach((a,j)=>a.textContent=faqOpen===j?'▲':'▼');
}
function fFaq(v){document.querySelectorAll('#fL .fi').forEach(f=>{f.style.display=f.dataset.q.includes(v.toLowerCase())?'':'none';});}

// ── GLOSSARY ──
function rGlossary(){return`
<h2>📖 Glosario de Expresiones Canónicas</h2>
<div class="sub">Términos técnico-jurídicos del Manual SIA v2.0</div>
<input class="srch" placeholder="🔍 Buscar término…" oninput="fGlos(this.value)">
<div class="card" style="padding:0;overflow:hidden">
  <table><thead><tr><th>Término</th><th>Definición</th><th>Regla</th></tr></thead>
  <tbody id="gB">${GLOS.map(x=>`<tr data-s="${(x.t+x.d).toLowerCase()}">
    <td><strong>${x.t}</strong></td><td style="color:var(--tl)">${x.d}</td>
    <td><span class="bx bp">${x.r}</span></td>
  </tr>`).join('')}</tbody></table>
</div>`;}

function fGlos(v){document.querySelectorAll('#gB tr').forEach(r=>{r.style.display=r.dataset.s.includes(v.toLowerCase())?'':'none';});}

// ===== INIT =====
mkSidebar();render();
</script>
</body>
